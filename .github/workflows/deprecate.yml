name: Deprecate Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deprecate (e.g. 1.0.1)'
        required: true
        type: string
      message:
        description: 'Deprecation message shown to operators on install'
        required: true
        type: string

permissions:
  contents: read

jobs:
  deprecate:
    name: npm deprecate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: npm deprecate
        run: npm deprecate "@apnex/missioncraft@${{ inputs.version }}" "${{ inputs.message }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
