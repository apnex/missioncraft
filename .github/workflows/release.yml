name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write   # OIDC for npm provenance attestation per §H.4 + F17
  contents: read    # checkout
  pages: write      # TypeDoc deploy to GitHub Pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: npm publish (provenance) + TypeDoc deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc-build
        run: npm run build

      - name: vitest (missioncraft)
        run: npm test

      - name: npm publish (OIDC-signed provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate TypeDoc
        run: npm run docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload TypeDoc artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
